version: "3.8"

services:
  telegram-proxy:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    image: telegram-proxy:latest
    container_name: telegram-proxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9080:9080"
    volumes:
      - ./logs/telegram:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

